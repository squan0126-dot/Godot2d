<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小说工作台</title>
<link rel="stylesheet" href="novel-studio.css">
</head>
<body>
<div id="app">

  <!-- 顶部工具栏 -->
  <div id="toolbar">
    <span class="brand" id="projectName" onclick="openProjectModal()">📖 小说工作台</span>
    <div class="toolbar-right">
      <button class="btn btn-sm" id="btnExport">📤 导出</button>
      <button class="btn btn-sm" id="btnImport">📥 导入</button>
      <button class="btn btn-sm btn-primary" id="btnSave">💾 保存</button>
      <span class="word-count" id="wordCount">本章 0 字</span>
    </div>
  </div>

  <!-- 主区域三栏 -->
  <div id="main">

    <!-- 左侧面板 -->
    <div id="left-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="chapters">📑 章节</div>
        <div class="panel-tab" data-tab="outline">📋 大纲</div>
        <div class="panel-tab" data-tab="chars">👤 人物</div>
      </div>
      <!-- 章节列表 -->
      <div class="panel-content" id="chaptersContent">
        <div id="chapterList"></div>
      </div>
      <!-- 大纲/工具 -->
      <div class="panel-content hidden" id="outlineContent">
        <div id="outlinePanel"></div>
      </div>
      <!-- 人物列表 -->
      <div class="panel-content hidden" id="charsContent">
        <div id="charList"></div>
      </div>
    </div>

    <!-- 中间编辑区 -->
    <div id="center-panel">
      <div class="editor-header">
        <span class="editor-title" id="editorTitle">请从左侧选择章节开始写作</span>
        <div class="editor-nav">
          <button class="btn btn-sm" id="btnPrev">◀ 上一章</button>
          <button class="btn btn-sm" id="btnNext">下一章 ▶</button>
        </div>
      </div>
      <div id="aiContextBar" style="display:none;padding:6px 12px;font-size:11px;background:#fef3c7;color:#78350f;border-bottom:1px solid #fcd34d;line-height:1.5"></div>
      <textarea id="editor" placeholder="此处落笔。" spellcheck="false"></textarea>
    </div>

    <!-- 右侧面板 -->
    <div id="right-panel">
      <div class="right-tabs">
        <div class="right-tab active" data-tab="tools">🗂️ 工具箱</div>
        <div class="right-tab" data-tab="checker">🔍 风格检查 <span class="badge" id="checkerBadge" style="display:none">0</span></div>
        <div class="right-tab" data-tab="ai">🤖 AI</div>
      </div>
      <!-- 工具箱 -->
      <div class="right-content" id="toolsContent">
        <div id="toolsPanel"></div>
      </div>
      <!-- 风格检查 -->
      <div class="right-content hidden" id="checkerContent">
        <div style="padding:4px 0;margin-bottom:4px;">
          <button class="btn btn-sm btn-primary" id="btnCheck" style="width:100%">重新检查 (Ctrl+L)</button>
        </div>
        <div id="checkerResults">
          <div class="check-empty">编辑区为空，<br>请先写一些内容再检查。</div>
        </div>
      </div>
      <!-- AI助手 -->
      <div class="right-content hidden" id="aiContent">
        <div class="ai-chat">
          <div class="ai-messages" id="aiMessages"></div>
          <div class="ai-input-area">
            <div class="ai-presets" id="aiPresets"></div>
            <div class="ai-input-row">
              <input type="text" id="aiInput" placeholder="输入指令，或选中文本后点预设…">
              <button class="btn btn-sm btn-primary" id="btnAiSend">发</button>
              <button class="btn btn-sm" id="btnAiStop">停</button>
              <button class="btn btn-sm" id="btnAiInsert">插入</button>
              <button class="btn btn-sm" id="btnAiPreview" title="预览即将注入给AI的小说世界观上下文">👁 预览注入</button>
              <button class="btn btn-sm" id="btnAiClear">清</button>
            </div>
            <div class="ai-settings">
              <div class="ai-settings-row">
                <label>Ollama</label>
                <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
              </div>
              <div class="ai-settings-row">
                <label>模型</label>
                <input type="text" id="ollamaModel" placeholder="qwen2.5:7b">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- 底部状态栏 -->
  <div id="statusbar">
    <div class="status-left">
      <span><span class="status-dot saved" id="saveDot"></span>已保存</span>
      <span id="statusChapterWc">本章 0 字</span>
      <span id="statusTotalWc">总计 0 字</span>
    </div>
    <div class="status-right">
      <span>Ctrl+S 保存</span>
      <span>Ctrl+J/K 上下章</span>
      <span>Ctrl+L 检查</span>
      <span>Ctrl+I AI</span>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- ===== 模态框 ===== -->

<!-- 项目设置 -->
<div class="modal-overlay" id="modal-project">
  <div class="modal-box">
    <div class="modal-header"><span>📖 项目设置</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <label>作品名称</label><input id="proj-name" placeholder="未命名作品">
      <label>作者</label><input id="proj-author">
      <label>类型/题材</label><input id="proj-genre" placeholder="如：玄幻·悬疑">
      <label>简介</label><textarea id="proj-desc" rows="3"></textarea>
      <div class="modal-row">
        <div><label>目标字数</label><input id="proj-target" type="number" placeholder="0"></div>
        <div><label>状态</label>
          <select id="proj-status"><option>构思中</option><option>大纲阶段</option><option>写作中</option><option>修改中</option><option>已完结</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveProject">保存</button></div>
  </div>
</div>

<!-- 章节编辑 -->
<div class="modal-overlay" id="modal-chapter">
  <div class="modal-box">
    <div class="modal-header"><span id="chapterModalTitle">新建章节</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <label>章节标题 *</label><input id="ch-title">
      <div class="modal-row">
        <div><label>状态</label>
          <select id="ch-status"><option value="draft">草稿</option><option value="writing">写作中</option><option value="done">已完成</option><option value="revision">修改中</option></select>
        </div>
        <div><label>情绪基调</label>
          <select id="ch-mood"><option>紧张</option><option>平静</option><option>悲伤</option><option>欢快</option><option>恐惧</option><option>悬疑</option><option>温情</option><option>激烈</option></select>
        </div>
      </div>
      <label>涉及人物</label><input id="ch-chars" placeholder="逗号分隔">
      <label>章节摘要</label><textarea id="ch-summary" rows="3"></textarea>
      <label>大纲要点</label><textarea id="ch-outline" rows="3" placeholder="本章要完成的事情"></textarea>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveChapter">保存</button></div>
  </div>
</div>

<!-- 人物编辑 -->
<div class="modal-overlay" id="modal-char">
  <div class="modal-box modal-lg">
    <div class="modal-header"><span id="charModalTitle">新建人物</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row-3">
        <div><label>姓名 *</label><input id="char-name" placeholder="角色名"></div>
        <div><label>身份定位</label><input id="char-title" placeholder="如：主角 / 穿越者"></div>
        <div><label>当下/最终态（快捷）</label>
          <select id="char-status">
            <option value="alive">存活</option>
            <option value="dying">垂死</option>
            <option value="dead">已故</option>
            <option value="soul">残魂</option>
            <option value="spirit">妖鬼</option>
            <option value="reincarnated">已转世</option>
            <option value="not_yet_born">未出生</option>
            <option value="unknown">下落不明</option>
          </select>
        </div>
      </div>
      <label>标签（逗号分隔）</label><input id="char-tags" placeholder="28岁，前会计，理性有底线">
      <label>简介</label><textarea id="char-summary" rows="2" placeholder="一两句话概括这个角色"></textarea>

      <!-- ===== 生死轨迹（新增） ===== -->
      <div style="margin-top:10px;padding:10px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <label style="margin:0;font-weight:600">⏱ 生死轨迹（每行一段：阶段 → 状态 · 描述）</label>
          <span id="char-tl-helper" style="font-size:10px;color:#64748b;cursor:pointer;text-decoration:underline">▼ 插入章节标记</span>
        </div>
        <div class="modal-row" style="margin-bottom:6px">
          <div><label style="font-size:11px">首次登场</label><input id="char-first-appear" placeholder="如：ch_an1_1 / 案一第1章 / BACKSTORY"></div>
          <div><label style="font-size:11px">最后登场</label><input id="char-last-appear" placeholder="如：ch_an1_7 / END"></div>
        </div>
        <textarea id="char-status-timeline" rows="6" style="font-family:Consolas,monospace;font-size:12px" placeholder="ch_an1_1 → ch_an1_5 : alive · 随主角同行
ch_an1_5 → ch_an1_7 : dying · 火墙抽干最后一口气
ch_an1_7 → END      : dead · 已埋葬，剑尖刻名

# 状态词典：alive存活 / dying垂死 / dead已故 / soul残魂 / spirit妖鬼 / reincarnated已转世 / not_yet_born未出生 / unknown下落不明
# 也支持中文写法：案一第1~5章：存活·随主角同行"></textarea>
      </div>

      <label style="margin-top:10px">详细信息（每行一条，"键：值"格式）</label>
      <textarea id="char-details" rows="5" placeholder="性格：理性有底线，吃软不吃硬&#10;能力：通幽、驱神、斩妖&#10;装备：青布道袍、刻字剑&#10;名言：我一个会计，你让我学这？"></textarea>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveChar">保存</button></div>
  </div>
</div>

<!-- 关系编辑 -->
<div class="modal-overlay" id="modal-rel">
  <div class="modal-box">
    <div class="modal-header"><span>添加关系</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>人物A</label><select id="rel-charA"></select></div>
        <div><label>人物B</label><select id="rel-charB"></select></div>
      </div>
      <div class="modal-row">
        <div><label>关系类型</label>
          <select id="rel-type"><option>血缘</option><option>爱情</option><option>友情</option><option>仇恨</option><option>师徒</option><option>主仆</option><option>利益</option><option>对手</option><option>自定义</option></select>
        </div>
        <div><label>自定义标签</label><input id="rel-custom"></div>
      </div>
      <label>关系描述</label><textarea id="rel-desc" rows="2"></textarea>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveRel">保存</button></div>
  </div>
</div>

<!-- 地点编辑 -->
<div class="modal-overlay" id="modal-loc">
  <div class="modal-box">
    <div class="modal-header"><span id="locModalTitle">新建地点</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>地点名称 *</label><input id="loc-name"></div>
        <div><label>所属区域</label><input id="loc-region"></div>
      </div>
      <div class="modal-row">
        <div><label>类型</label>
          <select id="loc-type"><option>城市</option><option>村镇</option><option>山林</option><option>水域</option><option>建筑</option><option>洞穴</option><option>道路</option><option>其他</option></select>
        </div>
        <div><label>氛围</label>
          <select id="loc-mood"><option>宁静</option><option>压抑</option><option>开阔</option><option>神秘</option><option>温馨</option><option>危险</option><option>繁华</option><option>荒凉</option></select>
        </div>
      </div>
      <label>描述</label><textarea id="loc-desc" rows="3"></textarea>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveLoc">保存</button></div>
  </div>
</div>

<!-- 钩子编辑 -->
<div class="modal-overlay" id="modal-hook">
  <div class="modal-box">
    <div class="modal-header"><span id="hookModalTitle">新建钩子/伏笔</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>标题 *</label><input id="hook-title"></div>
        <div><label>类型</label>
          <select id="hook-type"><option>开篇钩子</option><option>悬念</option><option>伏笔</option><option>反转铺垫</option><option>章末钩子</option></select>
        </div>
      </div>
      <label>描述</label><textarea id="hook-desc" rows="3"></textarea>
      <div class="modal-row">
        <div><label>埋设章节</label><input id="hook-plant" placeholder="如：第3章"></div>
        <div><label>回收章节</label><input id="hook-harvest" placeholder="如：第8章"></div>
      </div>
      <div class="modal-row">
        <div><label>状态</label>
          <select id="hook-status"><option value="open">未解答</option><option value="closed">已解答</option><option value="intentional">故意留白</option></select>
        </div>
        <div><label>重要程度</label>
          <select id="hook-priority"><option>高</option><option>中</option><option>低</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveHook">保存</button></div>
  </div>
</div>

<!-- 反转编辑 -->
<div class="modal-overlay" id="modal-reversal">
  <div class="modal-box modal-lg">
    <div class="modal-header"><span id="reversalModalTitle">新建反转</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>反转标题 *</label><input id="rev-title"></div>
        <div><label>反转类型</label>
          <select id="rev-type"><option>身份反转</option><option>动机反转</option><option>事实反转</option><option>关系反转</option><option>时间反转</option><option>认知反转</option></select>
        </div>
      </div>
      <label>反转内容</label><textarea id="rev-content" rows="3" placeholder="读者以为是A，实际是B"></textarea>
      <label>铺垫清单（每行一条）</label><textarea id="rev-foreshadow" rows="3" placeholder="确保反转有据可查"></textarea>
      <div class="modal-row">
        <div><label>触发章节</label><input id="rev-chapter" placeholder="如：第10章"></div>
        <div><label>关联人物</label><input id="rev-chars" placeholder="逗号分隔"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveReversal">保存</button></div>
  </div>
</div>

<!-- 时间线事件编辑 -->
<div class="modal-overlay" id="modal-timeline">
  <div class="modal-box">
    <div class="modal-header"><span id="timelineModalTitle">添加事件</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>时间 *</label><input id="tl-time" placeholder="如：建安十三年春"></div>
        <div><label>重要程度</label>
          <select id="tl-level"><option value="major">重大事件</option><option value="normal">普通事件</option><option value="minor">次要事件</option></select>
        </div>
      </div>
      <label>事件标题 *</label><input id="tl-title">
      <label>事件描述</label><textarea id="tl-desc" rows="3"></textarea>
      <label>涉及人物</label><input id="tl-chars" placeholder="逗号分隔">
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveTimeline">保存</button></div>
  </div>
</div>

<!-- 素材编辑 -->
<div class="modal-overlay" id="modal-material">
  <div class="modal-box">
    <div class="modal-header"><span id="materialModalTitle">添加素材</span><button class="btn btn-sm modal-close">✕</button></div>
    <div class="modal-body">
      <div class="modal-row">
        <div><label>类型</label>
          <select id="mat-type"><option>灵感</option><option>金句</option><option>意象</option><option>参考</option><option>笔记</option><option>对话</option></select>
        </div>
        <div><label>标签</label><input id="mat-tags" placeholder="逗号分隔"></div>
      </div>
      <label>内容 *</label><textarea id="mat-content" rows="5"></textarea>
      <label>来源/备注</label><input id="mat-source">
    </div>
    <div class="modal-footer"><button class="btn modal-cancel">取消</button><button class="btn btn-primary" id="btnSaveMaterial">保存</button></div>
  </div>
</div>

<script src="novel-studio.js"></script>
</body>
</html>
