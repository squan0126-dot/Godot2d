<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 小说创作工作台</title>
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3345;--bg5:#383d50;
  --text:#e8eaf0;--text2:#a0a8c0;--text3:#6b7394;
  --accent:#6366f1;--accent2:#818cf8;--accent-dim:#4338ca;
  --green:#10b981;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899;--cyan:#06b6d4;--orange:#f97316;
  --border:#2a2f40;--border2:#363c52;
  --radius:8px;--radius2:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-serif:'Georgia','Noto Serif SC',serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
  --sidebar-w:240px;--topbar-h:48px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:14px;line-height:1.5;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--bg5);}

/* === 顶栏 === */
.topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100;}
.topbar-logo{font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;}
.topbar-project{font-size:13px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:var(--radius);transition:background .15s;}
.topbar-project:hover{background:var(--bg3);}
.topbar-status{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3);}
.topbar-status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.topbar-btn{padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all .15s;}
.topbar-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.topbar-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.topbar-btn.primary:hover{background:var(--accent-dim);}

/* === 主体布局 === */
.app-body{display:flex;flex:1;overflow:hidden;}

/* === 侧边栏 === */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin-bottom:2px;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600;}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
.nav-item .badge{margin-left:auto;background:var(--bg4);color:var(--text3);font-size:11px;padding:1px 6px;border-radius:10px;min-width:20px;text-align:center;}
.nav-item.active .badge{background:rgba(255,255,255,.2);color:#fff;}
.nav-section{padding:6px 14px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:12px;}

/* === 主内容区 === */
.main-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.panel.active{display:flex;}
.panel-header{padding:16px 24px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg);}
.panel-title{font-size:16px;font-weight:700;color:var(--text);}
.panel-subtitle{font-size:12px;color:var(--text3);}
.panel-actions{margin-left:auto;display:flex;gap:8px;}
.panel-body{flex:1;overflow-y:auto;padding:20px 24px;}

/* === 按钮 === */
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:var(--bg4);border-color:var(--border2);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dim);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-ghost{background:transparent;border-color:transparent;}
.btn-ghost:hover{background:var(--bg3);}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff;}
.btn-danger:hover{opacity:.85;}

/* === 卡片 === */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;cursor:pointer;transition:all .2s;position:relative;}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow);}
.card-title{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.card-desc{font-size:12px;color:var(--text3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;background:var(--bg4);color:var(--text2);}
.tag-accent{background:rgba(99,102,241,.15);color:var(--accent2);}
.tag-green{background:rgba(16,185,129,.15);color:var(--green);}
.tag-yellow{background:rgba(245,158,11,.15);color:var(--yellow);}
.tag-red{background:rgba(239,68,68,.15);color:var(--red);}
.tag-purple{background:rgba(139,92,207,.15);color:var(--purple);}

/* === 表单 === */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit;transition:border-color .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* === 模态框 === */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.active{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);width:90%;max-width:600px;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow);}
.modal-lg{max-width:800px;}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:var(--radius);border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--bg4);color:var(--text);}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}

/* === 统计卡片 === */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;text-align:center;}
.stat-value{font-size:24px;font-weight:700;color:var(--accent2);}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px;}

/* === 空状态 === */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5;}
.empty-state p{font-size:14px;}

/* === Toast === */
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:9999;animation:slideIn .3s ease;box-shadow:var(--shadow);}
@keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* === 情节板 === */
.plotboard{display:flex;gap:12px;overflow-x:auto;padding-bottom:16px;height:100%;}
.plot-column{min-width:280px;max-width:320px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);display:flex;flex-direction:column;flex-shrink:0;}
.plot-col-header{padding:12px 14px;font-weight:600;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.plot-col-header .count{font-size:11px;color:var(--text3);font-weight:400;}
.plot-col-body{flex:1;overflow-y:auto;padding:8px;}
.plot-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;cursor:grab;transition:all .15s;}
.plot-card:hover{border-color:var(--accent);background:var(--bg4);}
.plot-card-title{font-size:12px;font-weight:600;margin-bottom:4px;}
.plot-card-desc{font-size:11px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.plot-card-meta{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}

/* === 时间线 === */
.timeline-list{position:relative;padding-left:24px;}
.timeline-list::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border);}
.timeline-item{position:relative;padding:12px 16px;margin-bottom:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;}
.timeline-item:hover{border-color:var(--accent);}
.timeline-item::before{content:'';position:absolute;left:-20px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
.timeline-item.major::before{background:var(--yellow);width:12px;height:12px;left:-21px;}
.timeline-date{font-size:11px;color:var(--text3);margin-bottom:4px;}
.timeline-title{font-size:13px;font-weight:600;}
.timeline-desc{font-size:12px;color:var(--text2);margin-top:4px;}

/* === 编辑器 === */
.editor-layout{display:flex;flex:1;overflow:hidden;}
.editor-sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0;}
.editor-sidebar-section{margin-bottom:16px;}
.editor-sidebar-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding:0 4px;}
.editor-sidebar-item{padding:6px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--text2);transition:background .15s;}
.editor-sidebar-item:hover{background:var(--bg3);}
.editor-sidebar-item.active{background:var(--accent);color:#fff;}
.editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.editor-toolbar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg);flex-shrink:0;}
.editor-info{font-size:12px;color:var(--text3);}
.editor-area{flex:1;overflow-y:auto;padding:32px 48px;}
.editor-textarea{width:100%;min-height:100%;border:none;background:transparent;color:var(--text);font-family:var(--font-serif);font-size:16px;line-height:2;resize:none;outline:none;}

/* === 关系图 === */
.rel-canvas{flex:1;position:relative;overflow:hidden;background:var(--bg);}
.rel-node{position:absolute;width:80px;height:80px;border-radius:50%;border:2px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:grab;transition:border-color .15s;background:var(--bg2);}
.rel-node:hover{border-color:var(--accent);z-index:10;}
.rel-node-name{font-size:11px;font-weight:600;text-align:center;line-height:1.2;}
.rel-node-role{font-size:9px;color:var(--text3);}

/* === 钩子列表 === */
.hook-list{display:flex;flex-direction:column;gap:10px;}
.hook-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s;}
.hook-item:hover{border-color:var(--accent);}
.hook-item-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.hook-item-title{font-size:13px;font-weight:600;flex:1;}
.hook-item-desc{font-size:12px;color:var(--text3);line-height:1.5;}
.hook-item-footer{display:flex;gap:8px;margin-top:8px;align-items:center;}

/* === 数据分析 === */
.chart-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;margin-bottom:16px;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px;}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:8px;}
.bar{background:var(--accent);border-radius:3px 3px 0 0;min-width:20px;flex:1;transition:height .3s;position:relative;}
.bar:hover{background:var(--accent2);}
.bar-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--text3);white-space:nowrap;}

/* === 素材库 === */
.material-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s;}
.material-item:hover{border-color:var(--accent);}
.material-type{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
.material-content{font-size:13px;margin-top:4px;line-height:1.6;}

/* === 反转设计 === */
.reversal-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s;}
.reversal-card:hover{border-color:var(--purple);}
.reversal-type-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;background:rgba(139,92,207,.15);color:var(--purple);margin-bottom:8px;}

/* === 人物卡片（写作台风格） === */
.char-card-new{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative;border-left:3px solid var(--accent);}
.char-card-new:hover{border-color:var(--accent);background:var(--bg3);}
.char-card-new .char-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.char-card-new .char-role-title{font-size:11px;color:var(--accent2);margin-bottom:6px;}
.char-card-new .char-tags-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.char-card-new .char-tag{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--bg4);color:var(--text2);}
.char-card-new .char-summary{font-size:12px;color:var(--text2);line-height:1.6;}
.char-card-new .char-details-block{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);}
.char-card-new.expanded .char-details-block{display:block;}
.char-detail-row{margin-bottom:5px;line-height:1.6;}
.char-detail-key{color:var(--accent2);font-weight:600;margin-right:4px;}
.char-card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s;}
.char-card-new:hover .char-card-actions{opacity:1;}
.char-expand-hint{font-size:10px;color:var(--text3);margin-top:6px;}
.char-panel-toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.char-panel-toolbar .char-count{margin-left:auto;font-size:12px;color:var(--text3);}

/* === 搜索框 === */
.search-box{position:relative;}
.search-box input{padding-left:32px;}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-logo">📖 小说工作台</div>
  <div class="topbar-project" id="project-name" onclick="openProjectModal()">未命名作品</div>
  <div class="topbar-status">
    <span class="dot" style="background:var(--green)"></span>
    <span style="font-size:12px;color:var(--green)">本地存储</span>
    <button class="topbar-btn" onclick="exportBackup()">📤 导出备份</button>
    <button class="topbar-btn" onclick="importBackup()">📥 导入备份</button>
  </div>
</div>

<!-- 主体 -->
<div class="app-body">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-nav">
      <div class="nav-section">创作</div>
      <div class="nav-item active" data-panel="dashboard" onclick="switchPanel('dashboard')">
        <span class="icon">🏠</span>仪表盘
      </div>
      <div class="nav-item" data-panel="characters" onclick="switchPanel('characters')">
        <span class="icon">👥</span>人物<span class="badge" id="badge-chars">0</span>
      </div>
      <div class="nav-item" data-panel="relations" onclick="switchPanel('relations')">
        <span class="icon">🕸️</span>关系图谱
      </div>
      <div class="nav-item" data-panel="locations" onclick="switchPanel('locations')">
        <span class="icon">📍</span>地点<span class="badge" id="badge-locs">0</span>
      </div>
      <div class="nav-section">结构</div>
      <div class="nav-item" data-panel="plotboard" onclick="switchPanel('plotboard')">
        <span class="icon">📋</span>情节板<span class="badge" id="badge-plots">0</span>
      </div>
      <div class="nav-item" data-panel="hooks" onclick="switchPanel('hooks')">
        <span class="icon">🪝</span>钩子伏笔<span class="badge" id="badge-hooks">0</span>
      </div>
      <div class="nav-item" data-panel="reversals" onclick="switchPanel('reversals')">
        <span class="icon">🔄</span>反转设计<span class="badge" id="badge-reversals">0</span>
      </div>
      <div class="nav-item" data-panel="timeline" onclick="switchPanel('timeline')">
        <span class="icon">📅</span>时间线<span class="badge" id="badge-timeline">0</span>
      </div>
      <div class="nav-section">写作</div>
      <div class="nav-item" data-panel="chapters" onclick="switchPanel('chapters')">
        <span class="icon">📑</span>章节<span class="badge" id="badge-chapters">0</span>
      </div>
      <div class="nav-item" data-panel="editor" onclick="switchPanel('editor')">
        <span class="icon">✍️</span>正文编辑
      </div>
      <div class="nav-section">工具</div>
      <div class="nav-item" data-panel="materials" onclick="switchPanel('materials')">
        <span class="icon">🗂️</span>素材库<span class="badge" id="badge-materials">0</span>
      </div>
      <div class="nav-item" data-panel="analytics" onclick="switchPanel('analytics')">
        <span class="icon">📊</span>数据分析
      </div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <!-- 仪表盘 -->
    <div class="panel active" id="panel-dashboard">
      <div class="panel-header">
        <div class="panel-title">🏠 仪表盘</div>
        <div class="panel-subtitle" id="dashboard-subtitle"></div>
      </div>
      <div class="panel-body">
        <div class="stat-grid" id="stat-grid"></div>
        <div class="card-grid" id="dashboard-grid"></div>
      </div>
    </div>

    <!-- 人物管理 -->
    <div class="panel" id="panel-characters">
      <div class="panel-header">
        <div class="panel-title">👥 人物管理</div>
        <input class="form-input" id="char-search" placeholder="搜索人物..." oninput="renderCharacters()" style="flex:1;max-width:240px;margin-left:16px">
        <div class="panel-actions"><button class="btn btn-primary btn-sm" onclick="openCharModal()">+ 新建人物</button></div>
      </div>
      <div class="panel-body" style="padding:16px 20px;"><div id="char-grid"></div></div>
    </div>

    <!-- 关系图谱 -->
    <div class="panel" id="panel-relations">
      <div class="panel-header">
        <div class="panel-title">🕸️ 关系图谱</div>
        <div class="panel-actions">
          <button class="btn btn-sm" onclick="openRelModal()">+ 添加关系</button>
          <button class="btn btn-sm btn-ghost" onclick="autoLayout()">⚡ 自动布局</button>
        </div>
      </div>
      <div class="rel-canvas" id="rel-canvas">
        <svg id="rel-svg" style="position:absolute;inset:0;pointer-events:none;"></svg>
        <div id="rel-nodes"></div>
      </div>
    </div>

<script>
// ===== 全局状态 =====
let DB = {
  project: {name:'未命名作品',author:'',genre:'',desc:'',targetWords:0,startDate:'',status:'构思中'},
  characters: [],
  relations: [],
  locations: [],
  plots: {columns:['第一幕·起','第二幕·承','第三幕·转','第四幕·合'],cards:[]},
  hooks: [],
  reversals: [],
  timeline: [],
  chapters: [],
  materials: [],
  settings: {theme:'dark',autoSave:true,fontSize:16,editorFont:'serif'}
};
let relPositions = {};
let currentPanel = 'dashboard';
let editingId = null;
let currentChapterId = null;
let autoSaveTimer = null;
let focusMode = false;

// ===== 工具函数 =====
const $ = id => document.getElementById(id);
const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2,6);

function showToast(msg) {
  const old = document.querySelector('.toast');
  if(old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function closeModal(id) { $(id).classList.remove('active'); editingId = null; }
function openModal(id) { $(id).classList.add('active'); }

// ===== 面板切换 =====
function switchPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.panel === name));
  document.querySelectorAll('.panel').forEach(el => el.classList.toggle('active', el.id === 'panel-' + name));
  // 渲染对应面板
  const renderers = {
    dashboard: renderDashboard,
    characters: renderCharacters,
    relations: renderRelations,
    locations: renderLocations,
    plotboard: renderPlotboard,
    hooks: renderHooks,
    reversals: renderReversals,
    timeline: renderTimeline,
    chapters: renderChapters,
    editor: renderEditor,
    materials: renderMaterials,
    analytics: renderAnalytics
  };
  renderers[name]?.();
}

// ===== localStorage 存储 =====
function autoSave(key) {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try { localStorage.setItem('novel_' + key, JSON.stringify(DB[key])); } catch(e) {}
  }, 300);
}

function saveAll() {
  const keys = ['project','characters','relations','locations','plots','hooks','reversals','timeline','chapters','materials','settings'];
  keys.forEach(key => {
    try { localStorage.setItem('novel_' + key, JSON.stringify(DB[key])); } catch(e) {}
  });
  showToast('💾 已保存到本地');
}

function exportBackup() {
  const keys = ['project','characters','relations','locations','plots','hooks','reversals','timeline','chapters','materials','settings'];
  const data = {};
  keys.forEach(k => data[k] = DB[k]);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${DB.project.name||'小说'}_备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 备份已导出');
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const keys = ['project','characters','relations','locations','plots','hooks','reversals','timeline','chapters','materials','settings'];
        keys.forEach(k => { if (data[k] !== undefined) DB[k] = data[k]; });
        saveAll();
        updateProjectName();
        updateBadges();
        switchPanel('dashboard');
        showToast('📥 备份已导入 ✓');
      } catch(e) {
        showToast('❌ 导入失败，文件格式有误');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== 人物管理 =====
function renderCharacters() {
  const search = ($('char-search')?.value || '').toLowerCase();
  const chars = DB.characters.filter(c =>
    c.name.toLowerCase().includes(search) ||
    (c.title||'').toLowerCase().includes(search) ||
    (c.summary||'').toLowerCase().includes(search)
  );
  const grid = $('char-grid');
  if (!chars.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">👤</div><p>还没有人物，点击右上角新建</p></div>`;
    return;
  }
  // 列表模式（写作台风格）
  grid.style.display = 'block';
  grid.innerHTML = chars.map(c => {
    const color = c.color || '#6366f1';
    const tags = Array.isArray(c.tags) ? c.tags : (c.tags||'').split(/[，,]/).filter(Boolean);
    // 兼容旧字段：把旧字段合并成details
    let details = c.details || {};
    if (typeof details === 'string') {
      // 解析键值对文本
      details = {};
      c.details.split('\n').forEach(line => {
        const idx = line.indexOf('：');
        if (idx > 0) details[line.slice(0,idx).trim()] = line.slice(idx+1).trim();
      });
    }
    // 兼容旧字段
    if (!Object.keys(details).length) {
      if (c.appearance) details['外貌'] = c.appearance;
      if (c.personality) details['性格'] = c.personality;
      if (c.goal) details['目标'] = c.goal;
      if (c.desire) details['欲望'] = c.desire;
      if (c.secret) details['秘密'] = c.secret;
      if (c.arc) details['成长弧线'] = c.arc;
      if (c.notes) details['备注'] = c.notes;
    }
    const detailsHtml = Object.entries(details).map(([k,v]) => {
      const val = Array.isArray(v) ? v.join('；') : v;
      return `<div class="char-detail-row"><span class="char-detail-key">${k}：</span>${val}</div>`;
    }).join('');
    const hasDetails = Object.keys(details).length > 0;
    return `
    <div class="char-card-new" onclick="toggleCharCard(this)" data-id="${c.id}">
      <div class="char-card-actions">
        <button class="btn btn-sm" onclick="event.stopPropagation();openCharModal('${c.id}')">✎</button>
        <button class="btn btn-sm" style="color:var(--red)" onclick="event.stopPropagation();deleteChar('${c.id}')">✕</button>
      </div>
      <div class="char-name">${c.name}</div>
      <div class="char-role-title">${c.title||c.role||''}</div>
      ${tags.length ? `<div class="char-tags-row">${tags.map(t=>`<span class="char-tag">${t}</span>`).join('')}</div>` : ''}
      ${c.summary ? `<div class="char-summary">${c.summary}</div>` : ''}
      ${hasDetails ? `<div class="char-details-block">${detailsHtml}</div><div class="char-expand-hint">▼ 点击展开详情</div>` : ''}
    </div>`;
  }).join('');
  // 根据颜色设置左边框
  grid.querySelectorAll('.char-card-new').forEach(card => {
    const id = card.dataset.id;
    const c = DB.characters.find(x => x.id === id);
    if (c && c.color) card.style.borderLeftColor = c.color;
  });
}

function toggleCharCard(card) {
  card.classList.toggle('expanded');
  const hint = card.querySelector('.char-expand-hint');
  if (hint) hint.textContent = card.classList.contains('expanded') ? '▲ 收起' : '▼ 点击展开详情';

function openCharModal(id) {
  editingId = id || null;
  $('char-modal-title').textContent = id ? '编辑人物' : '新建人物';
  if (id) {
    const c = DB.characters.find(x => x.id === id);

    $('char-name').value = c.name || '';
    $('char-title').value = c.title || c.role || '';
    // 标签
    const tags = Array.isArray(c.tags) ? c.tags : (c.tags||'').split(/[，,]/).filter(Boolean);
    $('char-tags').value = tags.join('，');
    $('char-summary').value = c.summary || '';
    // 详情：兼容旧字段
    let details = c.details || {};
    if (!Object.keys(details).length) {
      if (c.appearance) details['外貌'] = c.appearance;
      if (c.personality) details['性格'] = c.personality;
      if (c.goal) details['目标'] = c.goal;
      if (c.desire) details['欲望'] = c.desire;
      if (c.secret) details['秘密'] = c.secret;
      if (c.arc) details['成长弧线'] = c.arc;
      if (c.notes) details['备注'] = c.notes;
    }
    const detailsText = Object.entries(details).map(([k,v]) => {
      const val = Array.isArray(v) ? v.join('；') : v;

function saveChar() {
  const name = $('char-name').value.trim();
  if (!name) { showToast('请输入人物姓名'); return; }
  // 解析详情文本
  const detailsText = $('char-details').value.trim();
  const details = {};
  if (detailsText) {
    detailsText.split('\n').forEach(line => {
      const idx = line.indexOf('：');
      if (idx > 0) {
        details[line.slice(0,idx).trim()] = line.slice(idx+1).trim();
      } else {
        const idx2 = line.indexOf(':');
        if (idx2 > 0) details[line.slice(0,idx2).trim()] = line.slice(idx2+1).trim();
      }
    });
  }
  const tags = $('char-tags').value.split(/[，,]/).map(t=>t.trim()).filter(Boolean);
  const cd = {
    name,
    title: $('char-title').value.trim(),
    tags,
    summary: $('char-summary').value.trim(),
    details,
    color: (editingId ? (DB.characters.find(x=>x.id===editingId)||{}).color : null) || '#6366f1',
  };
  if (editingId) {
    const i = DB.characters.findIndex(x => x.id === editingId);
    if (i !== -1) DB.characters[i] = { ...DB.characters[i], ...cd };
  } else {
    DB.characters.push({ id: genId(), ...cd });
  }
  autoSave('characters');
  closeModal('modal-char');
  renderCharacters();
  updateBadges();
  showToast(editingId ? '人物已更新 ✓' : '人物已创建 ✓');
}

function deleteChar(id) {
  if (!confirm('确定删除该人物？')) return;
  DB.characters = DB.characters.filter(c => c.id !== id);
  DB.relations = DB.relations.filter(r => r.charA !== id && r.charB !== id);
  autoSave('characters');
  autoSave('relations');
  renderCharacters();
  updateBadges();
  showToast('人物已删除');
}

// ===== 关系图谱 =====
function renderRelations() {
  const canvas = $('rel-canvas');
  const nodes = $('rel-nodes');
  const svg = $('rel-svg');
  nodes.innerHTML = '';
  svg.innerHTML = '';
  if (!DB.characters.length) {
    nodes.innerHTML = '<div class="empty-state" style="position:absolute;inset:0"><div class="icon">🕸️</div><p>先创建人物再来建立关系</p></div>';
    return;
  }
  const W = canvas.clientWidth || 800, H = canvas.clientHeight || 500;
  DB.characters.forEach((c, i) => {
    if (!relPositions[c.id]) {
      const a = (i / DB.characters.length) * Math.PI * 2, r = Math.min(W, H) * 0.32;
      relPositions[c.id] = { x: W/2 + r*Math.cos(a) - 40, y: H/2 + r*Math.sin(a) - 40 };
    }
  });
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  // 画线
  DB.relations.forEach(rel => {
    const pA = relPositions[rel.charA], pB = relPositions[rel.charB];
    if (!pA || !pB) return;
    const ax=pA.x+40, ay=pA.y+40, bx=pB.x+40, by=pB.y+40;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ax);line.setAttribute('y1',ay);line.setAttribute('x2',bx);line.setAttribute('y2',by);
    line.setAttribute('stroke','#3a3f55');line.setAttribute('stroke-width','1.5');
    svg.appendChild(line);
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',(ax+bx)/2);lbl.setAttribute('y',(ay+by)/2-5);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','#6b7394');lbl.setAttribute('font-size','10');
    lbl.textContent = rel.type==='自定义' ? (rel.custom||rel.type) : rel.type;
    svg.appendChild(lbl);
  });
  // 画节点
  DB.characters.forEach(c => {
    const pos = relPositions[c.id];
    const node = document.createElement('div');
    node.className = 'rel-node';
    node.style.cssText = `left:${pos.x}px;top:${pos.y}px;border-color:${c.color||'var(--border)'};`;
    node.innerHTML = `<div class="rel-node-name">${c.name}</div><div class="rel-node-role">${c.role||''}</div>`;
    node.dataset.id = c.id;
    node.addEventListener('mousedown', startDragNode);
    nodes.appendChild(node);
  });
}

function startDragNode(e) {
  e.preventDefault();
  const node = e.currentTarget, id = node.dataset.id, pos = relPositions[id];
  const ox = e.clientX - pos.x, oy = e.clientY - pos.y;
  const onMove = ev => {
    const canvas = $('rel-canvas'), rect = canvas.getBoundingClientRect();
    relPositions[id] = { x: Math.max(0, Math.min(rect.width-80, ev.clientX-rect.left-40)), y: Math.max(0, Math.min(rect.height-80, ev.clientY-rect.top-40)) };
    node.style.left = relPositions[id].x + 'px';
    node.style.top = relPositions[id].y + 'px';
    updateRelLines();
  };
  const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function updateRelLines() {
  const svg = $('rel-svg'), canvas = $('rel-canvas');
  svg.innerHTML = '';
  svg.setAttribute('width', canvas.clientWidth);
  svg.setAttribute('height', canvas.clientHeight);
  DB.relations.forEach(rel => {
    const pA = relPositions[rel.charA], pB = relPositions[rel.charB];
    if (!pA || !pB) return;
    const ax=pA.x+40, ay=pA.y+40, bx=pB.x+40, by=pB.y+40;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ax);line.setAttribute('y1',ay);line.setAttribute('x2',bx);line.setAttribute('y2',by);
    line.setAttribute('stroke','#3a3f55');line.setAttribute('stroke-width','1.5');
    svg.appendChild(line);
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',(ax+bx)/2);lbl.setAttribute('y',(ay+by)/2-5);
    lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill','#6b7394');lbl.setAttribute('font-size','10');
    lbl.textContent = rel.type==='自定义' ? (rel.custom||rel.type) : rel.type;
    svg.appendChild(lbl);
  });
}

function autoLayout() {
  const canvas = $('rel-canvas'), W = canvas.clientWidth||800, H = canvas.clientHeight||500;
  DB.characters.forEach((c, i) => {
    const a = (i / DB.characters.length) * Math.PI * 2, r = Math.min(W, H) * 0.32;
    relPositions[c.id] = { x: W/2 + r*Math.cos(a) - 40, y: H/2 + r*Math.sin(a) - 40 };

}

// ===== 数据分析 =====
function renderAnalytics() {
  const content = $('analytics-content');
  // 章节字数分布
  const chapterWords = DB.chapters.map((c, i) => ({ label: `${i+1}`, value: c.wordCount || 0 }));
  const maxWords = Math.max(...chapterWords.map(c => c.value), 1);
  
  // 人物出场频率（简单统计）
  const charFreq = DB.characters.map(c => {
    const count = DB.chapters.filter(ch => (ch.chars||'').includes(c.name) || (ch.content||'').includes(c.name)).length;
    return { name: c.name, count };
  }).sort((a,b) => b.count - a.count).slice(0, 10);
  const maxFreq = Math.max(...charFreq.map(c => c.count), 1);

  content.innerHTML = `
    <div class="chart-container">
      <div class="chart-title">📊 各章字数分布</div>
      ${chapterWords.length ? `
        <div class="bar-chart">
          ${chapterWords.map(c => `<div class="bar" style="height:${Math.max(4, c.value/maxWords*100)}%" title="第${c.label}章: ${c.value}字"><div class="bar-label">${c.label}</div></div>`).join('')}
        </div>
      ` : '<div style="color:var(--text3);font-size:12px">暂无数据</div>'}
    </div>
    <div class="chart-container">
      <div class="chart-title">👥 人物出场频率（按章节）</div>
      ${charFreq.length ? `
        <div style="display:flex;flex-direction:column;gap:8px">
          ${charFreq.map(c => `
            <div style="display:flex;align-items:center;gap:10px">
              <span style="min-width:60px;font-size:12px;text-align:right">${c.name}</span>
              <div style="flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${c.count/maxFreq*100}%;background:var(--accent);border-radius:4px;transition:width .3s"></div>
              </div>
              <span style="font-size:11px;color:var(--text3);min-width:30px">${c.count}章</span>
            </div>
          `).join('')}
        </div>
      ` : '<div style="color:var(--text3);font-size:12px">暂无数据</div>'}
    </div>
    <div class="chart-container">
      <div class="chart-title">🪝 钩子状态分布</div>
      <div style="display:flex;gap:16px;font-size:13px">
        <span style="color:var(--yellow)">● 未解答: ${DB.hooks.filter(h=>h.status==='open').length}</span>
        <span style="color:var(--green)">● 已解答: ${DB.hooks.filter(h=>h.status==='closed').length}</span>
        <span style="color:var(--purple)">● 留白: ${DB.hooks.filter(h=>h.status==='intentional').length}</span>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-title">📈 创作概况</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
        <div>总字数：<strong>${DB.chapters.reduce((s,c)=>s+(c.wordCount||0),0).toLocaleString()}</strong></div>
        <div>总章节：<strong>${DB.chapters.length}</strong></div>
        <div>人物数：<strong>${DB.characters.length}</strong></div>
        <div>关系数：<strong>${DB.relations.length}</strong></div>
        <div>情节卡：<strong>${DB.plots.cards?.length||0}</strong></div>
        <div>反转数：<strong>${DB.reversals.length}</strong></div>
      </div>
    </div>
  `;
}

// ===== 更新徽章 =====
function updateBadges() {
  $('badge-chars').textContent = DB.characters.length;
  $('badge-locs').textContent = DB.locations.length;
  $('badge-plots').textContent = DB.plots.cards?.length || 0;
  $('badge-hooks').textContent = DB.hooks.filter(h=>h.status==='open').length;
  $('badge-reversals').textContent = DB.reversals.length;
  $('badge-timeline').textContent = DB.timeline.length;
  $('badge-chapters').textContent = DB.chapters.length;
  $('badge-materials').textContent = DB.materials.length;
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && focusMode) {
    toggleFocus();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveAll();
  }
});

// ===== 初始化 =====
(async function init() {
  const keys = ['project','characters','relations','locations','plots','hooks','reversals','timeline','chapters','materials','settings'];
  
  // 优先从 data/*.json 文件加载（需要本地服务器）
  let loadedFromFile = false;
  try {
    const results = await Promise.all(keys.map(key =>
      fetch(`/novel-workspace/data/${key}.json`)
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    let anyLoaded = false;
    results.forEach((data, i) => {
      if (data !== null) { DB[keys[i]] = data; anyLoaded = true; }
    });
    if (anyLoaded) loadedFromFile = true;
  } catch(e) {}

  // 回退：从 localStorage 加载
  if (!loadedFromFile) {
    keys.forEach(key => {
      try {
        const s = localStorage.getItem('novel_' + key);
        if (s) DB[key] = JSON.parse(s);
      } catch(e) {}
    });
  }

  updateProjectName();
  updateBadges();
  renderDashboard();
  showToast(loadedFromFile ? '✅ 已从 data/ 文件加载数据' : '✅ 数据已加载（localStorage）');
})();

// ===== 写回 JSON 文件 =====
async function saveToFile(key) {
  try {
    await fetch(`/novel-workspace/data/${key}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(DB[key], null, 2)
    });
  } catch(e) {
    // 服务器不支持写入时静默失败，localStorage已兜底
  }
}
</script>
</body>
