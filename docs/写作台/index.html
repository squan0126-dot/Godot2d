<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>《乱世行》写作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ====== 顶部工具栏 ====== -->
  <div id="toolbar">
    <span class="brand">《乱世行》写作台</span>
    <div class="toolbar-right">
      <button class="btn btn-sm" id="btnExport" title="导出全部数据">📤 导出</button>
      <button class="btn btn-sm" id="btnImport" title="导入备份数据">📥 导入</button>
      <button class="btn btn-sm" id="btnSave" title="保存 Ctrl+S">💾 保存</button>
      <span class="word-count" id="wordCount">本章 0 字</span>
    </div>
  </div>

  <!-- ====== 主区域：三栏 ====== -->
  <div id="main">

    <!-- 左侧面板 -->
    <div id="left-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="cases">📁 案件</div>
        <div class="panel-tab" data-tab="template">📋 模板</div>
        <div class="panel-tab" data-tab="chars">👤 角色</div>
      </div>
      <div class="panel-content" id="caseContent">
        <div id="caseList"></div>
      </div>
      <div class="panel-content hidden" id="templateContent"></div>
      <div class="panel-content hidden" id="charContent"></div>
    </div>

    <!-- 中间编辑区 -->
    <div id="center-panel">
      <div class="editor-header">
        <span class="editor-title" id="editorTitle">请选择一个章节</span>
        <div class="editor-nav">
          <button class="btn btn-sm" id="btnPrev" title="上一章 Ctrl+K">◀ 上一章</button>
          <button class="btn btn-sm" id="btnNext" title="下一章 Ctrl+J">下一章 ▶</button>
        </div>
      </div>
      <textarea
        id="editor"
        placeholder="此处落笔。"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 右侧面板 -->
    <div id="right-panel">
      <div class="right-tabs">
        <div class="right-tab active" data-tab="checker">
          🔍 风格检查
          <span class="badge" id="checkerBadge" style="display:none">0</span>
        </div>
        <div class="right-tab" data-tab="ai">🤖 AI 助手</div>
      </div>

      <!-- 检查结果 -->
      <div class="right-content" id="checkerContent">
        <div style="padding:4px 0;margin-bottom:4px;">
          <button class="btn btn-sm btn-primary" id="btnCheck" style="width:100%;">重新检查 (Ctrl+L)</button>
        </div>
        <div id="checkerResults">
          <div class="check-empty">编辑区为空，<br>请先写一些内容再检查。</div>
        </div>
      </div>

      <!-- AI 助手 -->
      <div class="right-content hidden" id="aiContent">
        <div class="ai-chat">
          <div class="ai-messages" id="aiMessages"></div>
          <div class="ai-input-area">
            <div class="ai-presets" id="aiPresets"></div>
            <div class="ai-input-row">
              <input type="text" id="aiInput" placeholder="输入指令，或选中文本后点预设标签…">
              <button class="btn btn-sm btn-primary" id="btnAiSend">发送</button>
              <button class="btn btn-sm" id="btnAiStop">停</button>
              <button class="btn btn-sm" id="btnAiInsert">插入</button>
              <button class="btn btn-sm" id="btnAiClear">清</button>
            </div>
            <div class="ai-settings">
              <div class="ai-settings-row">
                <label>Ollama</label>
                <input type="text" id="ollamaUrl" placeholder="http://localhost:11434">
              </div>
              <div class="ai-settings-row">
                <label>模型</label>
                <input type="text" id="ollamaModel" placeholder="qwen2.5:7b">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- ====== 底部状态栏 ====== -->
  <div id="statusbar">
    <div class="status-left">
      <span><span class="status-dot saved" id="saveDot"></span>已保存</span>
      <span id="statusCaseWc">本案 0 字</span>
      <span id="statusTotalWc">总计 0 字</span>
    </div>
    <div class="status-right">
      <span>Ctrl+S 保存</span>
      <span>Ctrl+J/K 上下章</span>
      <span>Ctrl+L 检查</span>
      <span>Ctrl+I AI</span>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- JS -->
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/checker.js"></script>
<script src="js/project.js"></script>
<script src="js/ai.js"></script>
<script src="js/app.js"></script>

</body>
</html>
